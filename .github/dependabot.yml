version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/vpn_handler"
    schedule:
      interval: "monthly"
    groups:
      cargo-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/server_handler"
    schedule:
      interval: "monthly"
    groups:
      gomod-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/bot"
    schedule:
      interval: "monthly"
    groups:
      pip-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      gha-deps:
        patterns: ["*"]
