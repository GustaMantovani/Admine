openapi: 3.0.0
x-stoplight:
  id: o7tsthhk77yfq
info:
  title: Server Handler
  version: '1.0'
servers:
  - url: 'http://localhost:3000'
paths:
  /logs:
    get:
      summary: Get latest server logs
      tags: []
      operationId: get-logs
      description: Get the last N lines from Minecraft server logs.
      parameters:
        - name: n
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          description: Number of latest log lines to return.
      responses:
        '200':
          $ref: '#/components/responses/LogsResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /info:
    get:
      summary: Your GET endpoint
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/InfoResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-info
      description: Get Minecraft server info.
  /status:
    get:
      summary: Your GET endpoint
      tags: []
      responses:
        '200':
          $ref: '#/components/responses/StatusResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      operationId: get-status
      description: Get Minecraft server status.
  /command:
    post:
      summary: ''
      operationId: post-command
      responses:
        '200':
          $ref: '#/components/responses/CommandExecutionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      requestBody:
        $ref: '#/components/requestBodies/CommandRequestBody'
      description: Execute a command in Minecraft server.
  /mods:
    post:
      summary: Install a mod
      operationId: post-install-mod
      description: Install a mod on the Minecraft server asynchronously. Accepts either a file upload (multipart/form-data) or a URL (application/json).
      responses:
        '202':
          $ref: '#/components/responses/ModInstallAcceptedResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/ErrorResponse'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The .jar mod file to install
              required:
                - file
          application/json:
            schema:
              $ref: '#/components/schemas/ModInstallRequest'
    get:
      summary: List installed mods
      operationId: get-mods
      description: List all installed .jar mods on the server.
      responses:
        '200':
          description: List of installed mods
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModListResult'
        '500':
          $ref: '#/components/responses/ErrorResponse'
  /mods/{filename}:
    delete:
      summary: Remove a mod
      operationId: delete-mod
      description: Remove a .jar mod from the server.
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
          description: Name of the .jar file to remove
      responses:
        '200':
          description: Mod removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModInstallResult'
        '400':
          description: Invalid file type
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    ServerInfo:
      title: ServerInfo
      x-stoplight:
        id: 845cda6469f48
      type: object
      properties:
        minecraftVersion:
          type: string
        javaVersion:
          type: string
        modEngine:
          type: string
        maxPlayers:
          type: integer
        seed:
          type: string
      required:
        - minecraftVersion
        - javaVersion
        - modEngine
        - maxPlayers
        - seed
    ServerStatus:
      title: ServerStatus
      x-stoplight:
        id: 7liftbz6ac42r
      type: object
      properties:
        health:
          type: string
          enum:
            - HEALTHY
            - 'SICK '
            - 'CRITICAL '
            - UNKNOWN
        status:
          type: string
          enum:
            - ONLINE
            - OFFLINE
            - MAINTENANCE
            - UNKNOWN
        description:
          type: string
        uptime:
          type: string
        tps:
          type: number
      required:
        - health
        - status
        - description
        - uptime
        - tps
    Command:
      title: Command
      x-stoplight:
        id: pie3lscxwq4pe
      type: object
      properties:
        command:
          type: string
      required:
        - command
    CommandResult:
      title: CommandResult
      x-stoplight:
        id: 73eihcwxtxam9
      type: object
      properties:
        exitCode:
          type: integer
        output:
          type: string
      required:
        - output
    LogsResponse:
      title: LogsResponse
      type: object
      properties:
        lines:
          type: array
          items:
            type: string
        total:
          type: integer
      required:
        - lines
        - total
    ModInstallRequest:
      title: ModInstallRequest
      type: object
      properties:
        url:
          type: string
          description: URL to download the .jar mod from
      required:
        - url
    ModInstallResponse:
      title: ModInstallResponse
      type: object
      properties:
        status:
          type: string
        message:
          type: string
      required:
        - status
        - message
    Server-Info:
      type: object
      x-examples:
        Example 1:
          value:
            minecraftVersion: string
            javaVersion: string
            modEngine: string
            maxPlayers: 0
            seed: string
      properties:
        minecraftVersion:
          type: string
        javaVersion:
          type: string
        modEngine:
          type: string
        maxPlayers:
          type: integer
        seed:
          type: string
      required:
        - minecraftVersion
        - javaVersion
        - modEngine
        - maxPlayers
        - seed
    ModListResult:
      title: ModListResult
      type: object
      properties:
        mods:
          type: array
          items:
            type: string
          description: List of installed .jar mod filenames
        total:
          type: integer
          description: Total number of installed mods
      required:
        - mods
        - total
  responses:
    ErrorResponse:
      description: Example response
      content:
        application/json:
          schema:
            type: object
            properties:
              mesage:
                type: string
            required:
              - mesage
        application/xml:
          schema:
            type: object
            properties:
              message:
                type: string
    InfoResponse:
      description: Example response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerInfo'
          examples: {}
    StatusResponse:
      description: Example response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerStatus'
    CommandExecutionResponse:
      description: Example response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommandResult'
    LogsResponse:
      description: Example response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LogsResponse'
    ModInstallAcceptedResponse:
      description: Mod installation accepted for async processing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ModInstallResponse'
  requestBodies:
    CommandRequestBody:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Command'
